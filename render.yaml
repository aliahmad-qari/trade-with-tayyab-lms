services:
  - type: web
    name: trade-with-tayyab-lms
    env: node
    plan: free
    # Deploy only the backend/ folder. Render runs install/build/start here.
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      # Server-side Gemini key (set the actual value in the Render dashboard).
      - key: GEMINI_API_KEY
        sync: false
      # MongoDB Atlas connection string.
      - key: MONGODB_URI
        sync: false
      # Secret used to sign/verify JWT auth tokens.
      - key: JWT_SECRET
        sync: false
      # Deployed Vercel frontend origin, used for CORS allow-list.
      - key: FRONTEND_URL
        sync: false
      # Cloudinary credentials for admin media uploads.
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      # WPay payment gateway — server-side only, never sent to frontend.
      # Set the secret and the REAL Payin URL (from mch.wpay.one) in the
      # Render dashboard. WPAY_PAYIN_URL must be the exact endpoint — the old
      # /v1/Payin returns 404. Optional WPAY_FIELD_* / WPAY_CB_* overrides let
      # you match the dashboard request/callback shape without a code change.
      - key: WPAY_MCH_ID
        value: "2794"
      - key: WPAY_SECRET_KEY
        sync: false
      - key: WPAY_PAYIN_URL
        sync: false
