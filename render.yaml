services:
  - type: web
    name: trade-with-tayyab-lms
    env: node
    plan: free
    # Deploy only the backend/ folder. Render runs install/build/start here.
    rootDir: backend
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      # Server-side Gemini key (set the actual value in the Render dashboard).
      - key: GEMINI_API_KEY
        sync: false
